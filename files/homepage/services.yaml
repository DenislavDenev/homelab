- Jelly:
    - Jellyfin:
        icon: jellyfin.png
        href: http://192.168.1.51:8096
        siteMonitor: http://192.168.1.51:8096
        statusStyle: dot
        description: Multimedia streaming library
        widget:
            type: jellyfin
            url: http://192.168.1.51:8096/
            key: "{{HOMEPAGE_VAR_JELLYFIN_API}}" # define in secrets.env or replace with your API
            enableBlocks: true 
            enableNowPlaying: false
            enableUser: false
            showEpisodeNumber: true 
            expandOneStreamToTwoRows: false
            fields: ["movies", "series"]

    - Jellyseerr:
        icon: jellyseerr.png
        href: http://192.168.1.51:5055
        siteMonitor: http://192.168.1.51:5055
        statusStyle: dot
        description: Request new library media
        widget:
            type: jellyseerr
            url: http://192.168.1.51:5055
            key: "{{HOMEPAGE_VAR_JELLYSEER_API}}" # define in secrets.env or replace with your API
            fields: ["pending", "approved", "available"]

- Media Management:
    - Radarr:
        icon: radarr.png
        href: http://192.168.1.51:7878
        siteMonitor: http://192.168.1.51:7878
        statusStyle: dot
        description: Automate downloading movies
        widget:
            type: radarr
            url: http://192.168.1.51:7878
            key: "{{HOMEPAGE_VAR_RADARR_API}}" # define in secrets.env or replace with your API
            fields: ["wanted", "queued", "movies"]     

    - Sonarr:
        icon: sonarr.png
        href: http://192.168.1.51:8989
        siteMonitor: http://192.168.1.51:8989
        statusStyle: dot
        description: Automate downloading series
        widget:
            type: sonarr
            url: http://192.168.1.51:8989
            key: "{{HOMEPAGE_VAR_SONARR_API}}" # define in secrets.env or replace with your API
            fields: ["wanted", "queued", "series"]

    - Bazarr:
        icon: bazarr.png
        href: http://192.168.1.51:6767
        siteMonitor: http://192.168.1.51:6767
        statusStyle: dot
        description: Media subtitles management
        widget:
            type: bazarr
            url: http://192.168.1.51:6767
            key: "{{HOMEPAGE_VAR_BAZARR_API}}" # define in secrets.env or replace with your API
            fields: ["missingEpisodes", "missingMovies"]

    - Prowlarr:
        icon: prowlarr.png
        href: http://192.168.1.51:9696
        siteMonitor: http://192.168.1.51:9696
        statusStyle: dot
        description: Indexer integration for downloads
        widget:
            type: prowlarr
            url: http://192.168.1.51:9696
            key: "{{HOMEPAGE_VAR_PROWLARR_API}}" # define in secrets.env or replace with your API
            fields: ["numberOfGrabs", "numberOfQueries"]

    - Qbittorrent:
        icon: qbittorrent.png
        href: http://192.168.1.51:8080
        siteMonitor: http://192.168.1.51:8080
        statusStyle: dot
        description: Bittorrent client 
        widget:
          type: qbittorrent
          url: http://192.168.1.51:8080
          username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}" # define in secrets.env or replace with your USERNAME
          password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}" # define in secrets.env or replace with your PASSWORD
          enableLeechProgress: true
          enableLeechSize: true
          fields: ["leech", "download", "seed", "upload"] 

- Tools:
    - Proxmox:
        icon: proxmox.png
        href: https://192.168.1.17:8006
        siteMonitor: https://192.168.1.17:8006
        statusStyle: dot
        widget:
            type: proxmox
            url: https://192.168.1.17:8006
            username: api@pam!homepage
            password: {{HOMEPAGE_VAR_PROXMOX_API}} # define in secrets.env or replace with your token secret
            #node: proxmox
            fields: ["vms", "lxc", "resources.cpu", "resources.mem"]
    - PiHole:
        icon: pi-hole.png
        href: http://192.168.1.52/admin/
        siteMonitor: http://192.168.1.52
        statusStyle: dot
        description: Network-wide ad blocker
        widget:
            type: pihole
            url: http://192.168.1.52
            version: 6 # required if running v6 or higher, defaults to 5
            key: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}" # optional, in v6 can be your password or app password -  define in secrets.env or replace with your API/PASS
            fields: ["queries", "blocked", "blocked_percent", "gravity"]

    - Vaultwarden:
        icon: vaultwarden.png
        href: https://192.168.1.55:8000/#/vault
        siteMonitor: https://192.168.1.55:8000
        statusStyle: dot
        description: Password management
