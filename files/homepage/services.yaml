- Release Calendar:
    - ⠀                      LEGEND:⠀⠀🟢 Series⠀⠀🔵 Movie:
          href: "## your jellyfin url"
          widget:
              type: calendar
              firstDayInWeek: monday
              view: monthly
              maxEvents: 10
              showTime: true
              timezone: "## your timezone"
              integrations:
                - type: sonarr
                  service_group: Media Management
                  service_name: Sonarr
                  color: green
                  params:
                      unmonitored: false
                - type: radarr
                  service_group: Media Management
                  service_name: Radarr
                  color: blue
                  params:
                      unmonitored: false

    - Agenda:
          href: "## your jellyfin url"
          widget:
              type: calendar
              firstDayInWeek: monday
              view: agenda
              maxEvents: 10
              showTime: true
              timezone: "## your timezone"
              integrations:
                - type: sonarr
                  service_group: Media Management
                  service_name: Sonarr
                  color: green
                  params:
                      unmonitored: false
                - type: radarr
                  service_group: Media Management
                  service_name: Radarr
                  color: blue
                  params:
                      unmonitored: false
