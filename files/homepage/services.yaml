- Infrastructure:
    - Proxmox:
        icon: proxmox.png
        href: "## your proxmox ip:port"
        siteMonitor: "## your proxmox ip:port"
        statusStyle: dot
        description: Hypervisor
        widget:
            type: proxmox
            url: "## your proxmox ip:port"
            username: "## your proxmox api user"
            password: "## your proxmox api token"
            fields: ["vms", "lxc", "resources.cpu", "resources.mem"]

- Media:
    - Immich:
        icon: immich.png
        href: "## your immich domain"
        siteMonitor: "## your immich domain"
        statusStyle: dot
        description: Photo backup & management
        widget:
            type: immich
            url: "## your immich domain"
            key: "## your immich api key"
            version: 2
            fields: ["users", "photos", "videos", "storage"]

    - Jellyfin:
        icon: jellyfin.png
        href: "## your jellyfin domain"
        siteMonitor: "## your jellyfin domain"
        statusStyle: dot
        description: Multimedia streaming library
        widget:
            type: jellyfin
            url: "## your jellyfin domain"
            key: "## your jellyfin api key"
            enableBlocks: true
            enableNowPlaying: false
            enableUser: false
            showEpisodeNumber: true
            expandOneStreamToTwoRows: false
            fields: ["movies", "series"]

- Media Management:
    - Radarr:
        icon: radarr.png
        href: "## your radarr domain"
        siteMonitor: "## your radarr domain"
        statusStyle: dot
        description: Automate downloading movies
        widget:
            type: radarr
            url: "## your radarr domain"
            key: "## your radarr api key"
            fields: ["wanted", "queued", "movies"]

    - Sonarr:
        icon: sonarr.png
        href: "## your sonarr domain"
        siteMonitor: "## your sonarr domain"
        statusStyle: dot
        description: Automate downloading series
        widget:
            type: sonarr
            url: "## your sonarr domain"
            key: "## your sonarr api key"
            fields: ["wanted", "queued", "series"]

    - Bazarr:
        icon: bazarr.png
        href: "## your bazarr domain"
        siteMonitor: "## your bazarr domain"
        statusStyle: dot
        description: Subtitle management
        widget:
            type: bazarr
            url: "## your bazarr domain"
            key: "## your bazarr api key"
            fields: ["missingEpisodes", "missingMovies"]

- No Widget Services:
    - Maintainerr:
        icon: maintainerr.png
        href: "## your maintainerr domain"
        siteMonitor: "## your maintainerr domain"
        statusStyle: dot
        description: Media library cleanup rules

    - Vaultwarden:
        icon: vaultwarden.png
        href: "## your vaultwarden domain"
        siteMonitor: "## your vaultwarden domain"
        statusStyle: dot
        description: Password management

- Downloads:
    - Jellyseerr:
        icon: jellyseerr.png
        href: "## your jellyseerr domain"
        siteMonitor: "## your jellyseerr domain"
        statusStyle: dot
        description: Request new library media
        widget:
            type: jellyseerr
            url: "## your jellyseerr domain"
            key: "## your jellyseerr api key"
            fields: ["pending", "approved", "available"]

    - qBittorrent:
        icon: qbittorrent.png
        href: "## your qbittorrent domain"
        siteMonitor: "## your qbittorrent domain"
        statusStyle: dot
        description: BitTorrent client
        widget:
            type: qbittorrent
            url: "## your qbittorrent ip:port"
            username: "## your qbittorrent username"
            password: "## your qbittorrent password"
            enableLeechProgress: true
            enableLeechSize: true
            fields: ["leech", "download", "seed", "upload"]

    - Prowlarr:
        icon: prowlarr.png
        href: "## your prowlarr domain"
        siteMonitor: "## your prowlarr domain"
        statusStyle: dot
        description: Indexer integration for downloads
        widget:
            type: prowlarr
            url: "## your prowlarr domain"
            key: "## your prowlarr api key"
            fields: ["numberOfGrabs", "numberOfQueries"]

- Network:
    - PiHole:
        icon: pi-hole.png
        href: "## your pihole ip/admin/"
        siteMonitor: "## your pihole ip"
        statusStyle: dot
        description: Network-wide ad blocker
        widget:
            type: pihole
            url: "## your pihole ip"
            version: 6
            key: "## your pihole api key or password"
            fields: ["queries", "blocked", "blocked_percent", "gravity"]

    - Nginx Proxy Manager:
        icon: nginx-proxy-manager.png
        href: "## your npm ip:port"
        siteMonitor: "## your npm ip:port"
        statusStyle: dot
        description: Reverse proxy management
        widget:
            type: npm
            url: "## your npm ip:port"
            username: "## your npm login email"
            password: "## your npm password"
            fields: ["enabled", "disabled", "total"]

