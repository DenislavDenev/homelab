- VPN:
    - Tailscale - HomeAssistant:
        icon: tailscale.png
        href: https://login.tailscale.com/admin/machines
        widget:
          type: tailscale
          url: https://api.tailscale.com
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_HOMEASSISTANT}}" # define in secrets.env or replace with your deviceID
