---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/settings/

providers:
  openweathermap: openweathermapapikey
  weatherapi: weatherapiapikey

background:
  image: https://images.unsplash.com/photo-1542909588-66492252c919?q=80&w=1738&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
  blur: xl
  #saturate: 50
  #brightness: 40
  #opacity: 75

layout:
  Infrastructure:
    style: row
    columns: 1
    header: false

  Media:
    style: row
    columns: 2
    header: false

  Media Management:
    style: row
    columns: 3
    header: false

  No Widget Services:
    style: row
    columns: 2
    header: false

  Downloads:
    style: row
    columns: 3
    header: false


  Network:
    style: row
    columns: 2
    header: false

  VPN:
    style: row
    columns: 5
    header: false

  Misc:
    style: row
    columns: 4
    header: false

  Release Calendar:
    style: row
    columns: 2
    header: true
